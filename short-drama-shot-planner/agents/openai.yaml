interface:
  display_name: "Short Drama Shot Planner"
  short_description: "Plan full shot objects from `scene-pack.md` or `scene-pack-fpv.md`, with camera-readable shot descriptions and short first-person voiceover captions that stay clear, specific, and story-driving."
  default_prompt: "Use $short-drama-shot-planner to turn this `scene-pack.md` or `scene-pack-fpv.md` into a shots array. Keep the original story order. If the input is `scene-pack-fpv.md`, first recover each scene's visible beats, turning point, and hook before planning shots. Each shot object must include scene_id, scene_number, shot_id, shot_number, shot_description, audience_read, and caption. Keep shot_description fully visual, third-person, and close to camera / storyboard language. Make caption a required first-person spoken-style voiceover passage that matches the current shot, usually 1 to 2 sentences and short enough to read naturally in about 2 to 3 seconds. Captions should be easy to understand on first listen, carry real story progression, and stay specific enough that the listener can follow the beat without relying on vague phrases like '有啲嘢唔對路' or '同我有關'. All captions read in order should tell the whole story. motion_note is optional and should be added only when it helps downstream video prompt generation."
